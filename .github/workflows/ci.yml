name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release-lockstep:
    name: Release lockstep
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate release metadata consistency
        run: |
          set -euo pipefail

          version="$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml)"
          tag="v${version}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "pyproject.toml version must be X.Y.Z; got ${version}" >&2
            exit 1
          fi

          grep -Fq "\"version\": \"${version}\"" .codex-plugin/plugin.json
          grep -Fq "@${tag}" .mcp.json
          grep -Fq "claude-in-codex==${version}" README.md
          grep -Fq "## ${version} -" CHANGELOG.md

  claude-contract:
    name: Claude CLI contract drift
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # This job installs a freshly fetched npm package whose install scripts
          # run in this workspace. Don't leave the checkout token in git config for
          # it to read; the job never pushes and only needs `contents: read`.
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --locked --python 3.12 --group dev

      # Install the latest published Claude Code so this job is a live drift canary
      # against the newest CLI. Failure (offline runner, npm hiccup) is non-fatal:
      # the next step skips gracefully if `claude` is unavailable.
      - name: Install Claude Code CLI
        id: install-claude
        continue-on-error: true
        run: npm install -g @anthropic-ai/claude-code

      - name: Check CLI contract drift (no-spend)
        run: |
          set -euo pipefail
          if ! command -v claude >/dev/null 2>&1; then
            echo "::notice::claude CLI unavailable on this runner; skipping contract drift check."
            exit 0
          fi
          claude --version
          # Exits 1 on real drift (fails the job); 2 if it could not probe at all.
          uv run python scripts/check_claude_contract.py

  package:
    name: Package checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --locked --python 3.12 --group dev

      - name: Build distributions
        run: uv build --no-sources

      - name: Check distributions
        run: uvx twine check dist/*

      - name: Smoke test installed wheel
        run: |
          set -euo pipefail

          python -m venv .smoke
          .smoke/bin/python -m pip install --upgrade pip
          .smoke/bin/python -m pip install dist/claude_in_codex-*.whl
          .smoke/bin/python - <<'PY'
          from importlib.metadata import distribution

          import claude_in_codex

          dist = distribution("claude-in-codex")
          scripts = [
              ep
              for ep in dist.entry_points
              if ep.group == "console_scripts" and ep.name == "claude-in-codex-mcp"
          ]

          assert claude_in_codex.__version__ == dist.version
          assert scripts, "claude-in-codex-mcp console script is missing"
          scripts[0].load()
          PY

  live-integration:
    name: Live Claude integration
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: Run integration tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run pytest -m integration --no-cov
