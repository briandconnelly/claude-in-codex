name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, with or without leading v
        required: true
        type: string
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref_name }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release-metadata:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Validate version references
        id: metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
              echo "Manual releases must run from main; got $GITHUB_REF" >&2
              exit 1
            fi
            version="${INPUT_VERSION#v}"
            tag="v${version}"
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists" >&2
              exit 1
            fi
          else
            tag="$REF_NAME"
            version="${tag#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be X.Y.Z; got ${version}" >&2
            exit 1
          fi

          grep -Fq "version = \"${version}\"" pyproject.toml
          grep -Fq "\"version\": \"${version}\"" .codex-plugin/plugin.json
          grep -Fq "@${tag}" .mcp.json
          grep -Fq "claude-in-codex==${version}" README.md
          grep -Fq "## ${version} -" CHANGELOG.md

          {
            echo "tag=${tag}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

  test:
    needs: release-metadata
    uses: ./.github/workflows/test.yml

  build:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Build distributions
        run: uv build --no-sources

      - name: Check distributions
        run: uvx twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-package-distributions
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  github-release:
    name: Create GitHub Release
    needs: [release-metadata, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Create tag if needed
        env:
          TAG: ${{ needs.release-metadata.outputs.tag }}
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "claude-in-codex ${TAG}" "$GITHUB_SHA"
          git push origin "$TAG"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-metadata.outputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release ${TAG} already exists."
            exit 0
          fi

          gh release create "$TAG" dist/* \
            --title "claude-in-codex ${TAG}" \
            --notes "See CHANGELOG.md for release notes."
